<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Параметрический 3D-модуль</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header>
      <h1>Параметрический 3D-модуль</h1>
      <p>Веб-интерфейс для сценарного задания геометрии, расчётов и экспорта STL.</p>
    </header>

    <main>
      <section class="panel controls">
        <h2>Сценарий</h2>

        <label for="example-select">Пример</label>
        <select id="example-select">
          <option value="">-- Выберите шаблон --</option>
          {% for name, content in examples.items() %}
          <option value="{{ name }}">{{ name }}</option>
          {% endfor %}
        </select>

        <label for="density">Плотность, кг/м³</label>
        <input type="number" id="density" step="0.1" value="7850" />

        <div class="constructor">
          <h3>Конструктор команд</h3>
          <div class="constructor-buttons">
            <button id="add-param-btn" type="button" class="secondary">+ param</button>
            <button id="add-box-btn" type="button" class="secondary">+ box</button>
            <button id="add-cylinder-btn" type="button" class="secondary">+ cylinder</button>
            <button id="add-extrude-btn" type="button" class="secondary">+ extrude</button>
          </div>
        </div>

        <textarea id="script" spellcheck="false">{{ default_script }}</textarea>

        <div class="actions">
          <button id="build-btn" type="button">Построить модель</button>
          <a id="download-btn" class="disabled" download="model.stl">Скачать STL</a>
        </div>
        <div class="actions secondary-actions">
          <button id="save-script-btn" type="button" class="secondary">Сохранить проект</button>
          <button id="load-script-btn" type="button" class="secondary">Загрузить проект</button>
          <button id="export-report-btn" type="button" class="secondary">Экспорт отчёта CSV</button>
        </div>
        <input id="load-script-input" type="file" accept=".txt" hidden />
        <p id="status">Готово к построению.</p>
      </section>

      <section class="panel result">
        <h2>3D-просмотр</h2>
        <p class="hint">
          Управление: удерживайте ЛКМ для вращения модели, колесо мыши для масштаба.
        </p>
        <div id="viewer"></div>
      </section>

      <section class="panel metrics">
        <h2>Инженерные характеристики</h2>
        <div id="metrics"></div>
        <h3>Параметры</h3>
        <div id="params"></div>
      </section>
    </main>

    <script>
      window.APP_EXAMPLES = {{ examples | tojson }};
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
